<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandhaan 26 - Events Page Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        comic: ["Bangers", "system-ui"],
                        marker: ["Permanent Marker", "cursive"],
                        sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
                    },
                    colors: {
                        'spidey-red': '#E23636',
                        'spidey-blue': '#5061E1',
                        'spidey-black': '#101010',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700;900&family=Permanent+Marker&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-spidey-black text-white font-sans overflow-x-hidden">
    <div id="glow" class="cursor-glow"></div>
    <!-- NAV -->
    <nav class="fixed top-0 w-full z-[100] p-6 flex justify-between items-center backdrop-blur-lg z-[90]">

        <!-- LOGO -->
        <div class="text-xl font-bold tracking-tighter border-l-4 border-red-600 pl-3">
            SANDHAN 2026
        </div>

        <!-- DESKTOP MENU -->
        <div class="space-x-12 text-[11px] uppercase tracking-[0.3em] font-light hidden md:flex">
            <a href="./index.html" class="hover:text-red-600 transition">Home</a>
            <a href="./about.html" class="hover:text-red-600 transition">About</a>
            <a href="./events.html" class="hover:text-red-600 transition">Events</a>
        </div>

        <!-- CONTACT BUTTON -->
        <button
            class="hidden md:block px-6 py-2 bg-white text-black text-[10px] font-bold uppercase hover:bg-red-600 hover:text-white transition-all duration-300">
            Contact Us
        </button>

        <!-- HAMBURGER -->
        <button id="menu-btn" class="md:hidden text-white">
            <i data-lucide="menu" class="w-7 h-7"></i>
        </button>
    </nav>

    <!-- MOBILE MENU (Navbar ke niche se open hoga) -->
    <!-- MOBILE MENU -->
    <div id="mobile-menu" class="fixed left-0 w-full  backdrop-blur-lg z-[90]
    top-[80px]
    flex flex-col items-center gap-6 py-8
    text-white uppercase tracking-widest
    transform -translate-y-10 opacity-0 pointer-events-none
    transition-all duration-300 rounded-b-2xl">

        <a href="./index.html" class="hover:text-red-600">Home</a>
        <a href="./about.html" class="hover:text-red-600">About</a>
        <a href="./events.html" class="hover:text-red-600">Events</a>

        <button
            class="mt-4 px-6 py-2 bg-white text-black text-sm font-bold uppercase hover:bg-red-600 hover:text-white transition">
            Contact Us
        </button>
    </div>

    <!-- Events Section -->
    <section id="events" class="pt-32 pb-24 px-4 min-h-screen bg-spidey-black web-pattern">
        <div class="max-w-7xl mx-auto">
            <header class="mb-16 text-center">
                <h1 class="text-6xl md:text-8xl text-white mb-4">MISSION <span class="text-spidey-red">LOG</span></h1>
                <p class="text-gray-400 text-xl max-w-2xl mx-auto">
                    Choose your mission. Every hero has a path, what's yours? Register now to secure your spot in the
                    multiverse.
                </p>
            </header>

            <!-- Filters -->
            <!-- <div class="flex flex-wrap justify-center gap-4 mb-12" id="categories-container"> -->
            <!-- Categories will be injected here -->
            <!-- </div> -->

            <!-- Events Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="events-grid">
                <!-- Events will be injected here -->
            </div>

            <div id="no-events" class="hidden text-center py-20">
                <i data-lucide="search" class="w-16 h-16 text-gray-600 mx-auto mb-4"></i>
                <p class="text-2xl text-gray-500 font-comic">No missions found in this dimension...</p>
            </div>
        </div>
    </section>

    <!-- Event Modal -->
    <div id="event-modal"
        class="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-10 pointer-events-none opacity-0">
        <div id="modal-overlay"
            class="absolute inset-0 bg-black/90 backdrop-blur-sm cursor-zoom-out opacity-0 transition-opacity duration-500">
        </div>
        <div id="modal-content"
            class="relative w-full max-w-6xl bg-spidey-black comic-border border-spidey-red overflow-hidden z-10 flex flex-col lg:flex-row max-h-[90vh] overflow-y-auto opacity-0">
            <button id="close-modal"
                class="absolute top-6 right-6 p-2 bg-spidey-red text-white rounded-full z-20 hover:scale-110 transition-transform">
                <i data-lucide="x" class="w-8 h-8"></i>
            </button>
            <div id="modal-body" class="flex flex-col lg:flex-row w-full">
                <!-- Modal content will be injected here -->
            </div>
        </div>
    </div>
    <!-- FOOTER -->
    <footer
        class="relative py-20 bg-gradient-to-t from-red-900/10 to-transparent border-t border-white/5 overflow-hidden">

        <div class="max-w-4xl mx-auto text-center relative z-10">

            <h2 class="footer-title text-3xl font-bold tracking-[0.5em] mb-8 animate-pulse text-white/80">
                JOIN THE LEAGUE
            </h2>

            <!-- ICONS BACK -->
            <div class="flex justify-center space-x-12 mb-12">

                <!-- insta -->
               <a href="#" class="group">
                    <div
                        class="p-3 border border-white/10 rounded-full hover:border-red-600 hover:shadow-[0_0_15px_#ed1d24] transition-all duration-300">
                        <img src="./assets/instagram.png" alt="" srcset="">
                    </div>
                </a>

                <!-- fb -->
                <a href="#" class="group">
                    <div
                        class="p-3 border border-white/10 rounded-full hover:border-red-600 hover:shadow-[0_0_15px_#ed1d24] transition-all duration-300">
                        <img src="./assets/facebook.png" alt="" srcset="">
                    </div>
                </a>

                <!-- linkedin -->
                <a href="#" class="group">
                    <div
                        class="p-3 border border-white/10 rounded-full hover:border-red-600 hover:shadow-[0_0_15px_#ed1d24] transition-all duration-300">
                        <img src="./assets/linkedin.png" alt="" srcset="">
                    </div>
                </a>

                <!-- yt-->
                <a href="#" class="group">
                    <div
                        class="p-3 border border-white/10 rounded-full hover:border-red-600 hover:shadow-[0_0_15px_#ed1d24] transition-all duration-300">
                        <img src="./assets/youtube.png" alt="" srcset="">
                    </div>
                </a>

            </div>

            <div class="text-[10px] tracking-[0.3em] text-gray-500">
                <p>© 2026 MODEL CLUB • BIT SINDRI </p>
            </div>

        </div>
    </footer>
    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="11.js"></script>
    <!-- <script src="script.js"></script> -->
</body>

</html>
